<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TamanGuard - Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans overflow-x-hidden">

    <!-- Top Bar -->
    <nav class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="font-bold tracking-wider">GUARD TERMINAL</span>
        </div>
        <div id="clock" class="text-sm font-mono text-slate-400">00:00:00</div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        
        <!-- Emergency Button -->
        <button onclick="triggerSOS()" class="w-full bg-red-600 active:bg-red-800 py-6 rounded-2xl shadow-lg shadow-red-900/20 flex items-center justify-center gap-4 border-b-4 border-red-900">
            <span class="text-3xl">🚨</span>
            <span class="text-xl font-black uppercase tracking-widest">Emergency SOS</span>
        </button>

        <!-- Main Scanner UI -->
        <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700">
            <h2 class="text-center text-slate-400 uppercase text-xs font-bold mb-4 tracking-widest">Entry Control</h2>
            
            <div id="reader" class="overflow-hidden rounded-xl bg-black mb-4"></div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startScanner()" class="bg-indigo-600 py-4 rounded-xl font-bold">Start Scanner</button>
                <button onclick="manualSearch()" class="bg-slate-700 py-4 rounded-xl font-bold">Manual Search</button>
            </div>
        </div>

        <!-- Real-time Visitor Feed -->
        <section>
            <h2 class="text-sm font-bold text-slate-500 uppercase mb-3 px-2">Inside Taman / Recent</h2>
            <div id="guard-log" class="space-y-3">
                <!-- Log entries will appear here -->
                <p class="text-center text-slate-600 py-10">Waiting for activity...</p>
            </div>
        </section>

    </main>

    <script>
        // 1. FIREBASE CONFIG (Use your same keys)
        const firebaseConfig = {
            apiKey: "AIzaSyDlsV0Fx__HwoyLEmEofsbK00qeWxjySyw",
            authDomain: "mytaman-1db3a.firebaseapp.com",
            projectId: "mytaman-1db3a",
            storageBucket: "mytaman-1db3a.firebasestorage.app",
            messagingSenderId: "112467759191",
            appId: "1:112467759191:web:0785a5e578741f01891312"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. CLOCK
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // 3. SCANNER LOGIC
        const html5QrCode = new Html5Qrcode("reader");

        function startScanner() {
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    // Success! The decodedText is the Document ID from Firebase
                    verifyGuest(decodedText);
                    html5QrCode.stop();
                }
            ).catch(err => alert("Camera Error: " + err));
        }

        async function verifyGuest(guestId) {
            try {
                const doc = await db.collection("visits").doc(guestId).get();
                if (doc.exists) {
                    const data = doc.data();
                    if(confirm(`GRANT ENTRY?\nName: ${data.visitor_name}\nUnit: ${data.unit_number}\nPlate: ${data.car_plate}`)) {
                        await db.collection("visits").doc(guestId).update({
                            status: "entered",
                            entry_time: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } else {
                    alert("INVALID PASS: Record not found.");
                }
            } catch (e) {
                alert("Error verifying: " + e.message);
            }
        }

        // 4. LOG LOGIC
        db.collection("visits").orderBy("timestamp", "desc").limit(10).onSnapshot(snapshot => {
            const log = document.getElementById('guard-log');
            log.innerHTML = "";
            
            snapshot.forEach(doc => {
                const v = doc.data();
                const isInside = v.status === "entered";
                
                log.innerHTML += `
                    <div class="p-4 rounded-2xl flex justify-between items-center ${isInside ? 'bg-emerald-900/30 border border-emerald-500/50' : 'bg-slate-800 border border-slate-700'}">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-black text-lg">${v.car_plate}</span>
                                <span class="text-xs bg-slate-700 px-2 py-0.5 rounded text-slate-400">${v.unit_number}</span>
                            </div>
                            <p class="text-sm text-slate-400">${v.visitor_name}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] block uppercase font-bold ${isInside ? 'text-emerald-400' : 'text-amber-400'}">
                                ${isInside ? '● INSIDE' : '○ EXPECTED'}
                            </span>
                            ${!isInside ? `<button onclick="verifyGuest('${doc.id}')" class="mt-2 bg-indigo-600 text-xs px-4 py-2 rounded-lg font-bold">ENTRY</button>` : ''}
                        </div>
                    </div>
                `;
            });
        });

        function manualSearch() {
            const plate = prompt("Enter Car Plate Number:");
            // We would normally add a search function here
            alert("Searching for: " + plate);
        }

        function triggerSOS() {
            if(confirm("SEND EMERGENCY ALERT TO ALL ADMINS?")) {
                db.collection("alerts").add({
                    type: "SOS",
                    guard_id: "Main Gate",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("SOS Sent!");
            }
        }
    </script>
</body>
</html>
